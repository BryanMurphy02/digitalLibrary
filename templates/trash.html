{% extends "layout.html" %}

{% block title %}
My App
{% endblock %}

{% block content %}
<h1 class="page-title">Trash</h1>

<div class="book-grid">
    {% for book in trash_table %}
        <div class="book-card trash-card">
            <div class="book-cover">
                {% if book.book_cover %}
                    <img src="{{ url_for('static', filename=book.book_cover) }}" alt="{{ book.book_title }}">
                {% else %}
                    <div class="no-cover">No Cover</div>
                {% endif %}
            </div>

            <div class="book-info">
                <h3 class="book-title">{{ book.book_title }}</h3>
                <p class="book-author">{{ book.author_first_name }} {{ book.author_last_name }}</p>
            </div>

            <div class="trash-actions">
                <form action="{{ url_for('restore', book_id=book.book_id) }}" method="POST">
                    <button type="submit" class="trash-btn restore-btn">Restore</button>
                </form>
                <form action="{{ url_for('hard_delete', book_id=book.book_id) }}" method="POST">
                    <button type="submit" class="trash-btn delete-btn">Delete</button>
                </form>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
