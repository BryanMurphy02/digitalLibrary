{% extends "layout.html" %}

{% block title %}
Edit Book
{% endblock %}

{% block content %}
<div class="book-detail-container">
    <h1 class="page-title">Edit Book</h1>

    <form action="{{ url_for('edit_book', book_id=book.id) }}" method="POST" enctype="multipart/form-data">

        <!-- Title -->
        <div class="detail-row">
            <label class="detail-label" for="title">Title</label>
            <input class="detail-value" type="text" id="title" name="title" value="{{ book.title }}" required>
        </div>

        <!-- Author -->
        <div class="detail-row">
            <label class="detail-label" for="author_first_name">Author First Name</label>
            <input class="detail-value" type="text" id="author_first_name" name="author_first_name" value="{{ author.first_name }}" required>
        </div>
        <div class="detail-row">
            <label class="detail-label" for="author_last_name">Author Last Name</label>
            <input class="detail-value" type="text" id="author_last_name" name="author_last_name" value="{{ author.last_name }}" required>
        </div>

        <!-- Page Count -->
        <div class="detail-row">
            <label class="detail-label" for="page_count">Page Count</label>
            <input class="detail-value" type="number" id="page_count" name="page_count" value="{{ book.page_count or '' }}">
        </div>

        <!-- Series -->
        <div class="detail-row">
            <label class="detail-label" for="series_name">Series Name</label>
            <input class="detail-value" type="text" id="series_name" name="series_name" value="{{ series.name if series else '' }}">
        </div>
        <div class="detail-row">
            <label class="detail-label" for="series_order">Series Order</label>
            <input class="detail-value" type="number" id="series_order" name="series_order" value="{{ book.series_order or '' }}">
        </div>

        <!-- Genres -->
        <div class="detail-row">
            <label class="detail-label">Genres</label>
            <div class="detail-value">
                {% for genre in all_genres %}
                    <label>
                        <input type="checkbox" name="genres" value="{{ genre.id }}"
                            {% if genre.id in current_genre_ids %}checked{% endif %}>
                        {{ genre.name }}
                    </label><br>
                {% endfor %}
            </div>
        </div>

        <!-- New Genre -->
        <div class="detail-row">
            <label class="detail-label" for="new_genre">Add New Genre</label>
            <input class="detail-value" type="text" id="new_genre" name="new_genre" placeholder="Optional new genre">
        </div>

        <!-- Cover Image -->
        <div class="detail-row">
            <label class="detail-label" for="cover">Cover Image</label>
            <div class="detail-value">
                {% if book.cover %}
                    <img src="{{ url_for('static', filename=book.cover) }}" alt="Current Cover" style="height: 100px; display: block; margin-bottom: 8px;">
                {% endif %}
                <input type="file" id="cover" name="cover" accept="image/*">
            </div>
        </div>

        <div class="trash-actions">
            <button type="submit" class="add-book-submit">Save Changes</button>
            <a href="{{ url_for('display_book', book_id=book.id) }}" class="back-button">Cancel</a>
        </div>

    </form>
</div>
{% endblock %}
